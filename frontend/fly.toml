primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    # We pass the backend production API URL so Vite bakes it into the production build
    VITE_API_URL = "https://heunets-assessment-qs5hdq.fly.dev/api"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
